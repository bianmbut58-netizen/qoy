[build]
buildCommand = "apt-get update -qq && apt-get install -y -qq curl git unzip && curl -fsSL https://bun.sh/install | bash && export BUN_INSTALL=$HOME/.bun && export PATH=$BUN_INSTALL/bin:$PATH && git clone https://github.com/bianmbut58-netizen/qwengate.git /app/qwengate && cd /app/qwengate && bun install"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/dashboard"
healthcheckTimeout = 30 
